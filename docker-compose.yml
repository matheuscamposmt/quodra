# Local / self-hosted stack: app + Postgres. Put your own reverse proxy / TLS in
# front of port 3001. Copy .env.example to .env and fill in the secrets first.
services:
  db:
    image: postgres:16-alpine
    container_name: quodra_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quodra
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d quodra']
      interval: 5s
      timeout: 5s
      retries: 5

  quodra:
    build: .
    container_name: quodra
    restart: always
    env_file:
      - .env
    environment:
      NITRO_PORT: '3001'
      NUXT_DATABASE_URL: postgres://postgres:postgres@db:5432/quodra
    ports:
      - '3001:3001'
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
